<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="width">
  <meta name="format-detection" content="telephone=no">

  <title>Zyqen Store</title>

  <meta name="description" content="Zyqen Store - vitrine independente de produtos afiliados com ofertas selecionadas.">
  <meta name="application-name" content="Zyqen Store">
  <meta name="theme-color" content="#ffffff">
  <meta name="background-color" content="#ffffff">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zyqen Store">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="/zyqen-store/manifest.json?v=20">
  <link rel="apple-touch-icon" sizes="180x180" href="/zyqen-store/imagens/icons/icon12.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/zyqen-store/imagens/icons/icon11.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/zyqen-store/imagens/icons/icon12.png">
  <link rel="icon" href="imagens/logo/favicon.png">

  <link rel="stylesheet" href="style.css?v=59">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --zq-bg: #ffffff;
      --zq-cream: #f8f4ec;
      --zq-cream2: #f3ecdf;
      --zq-card: #ffffff;
      --zq-text: #161616;
      --zq-muted: #5f5c57;
      --zq-muted2: #8c867b;
      --zq-line: #e8e2d7;
      --zq-line2: #d9c6a6;
      --zq-gold: #b98732;
      --zq-gold2: #d3a65c;
      --zq-gold3: #8a601f;
      --zq-green: #2e9156;
      --zq-shadow: 0 18px 50px rgba(37, 31, 22, 0.08);
      --zq-shadow-soft: 0 10px 28px rgba(37, 31, 22, 0.055);
      --zq-max: 1520px;
      --zq-pad: 42px;
      --font-title: Georgia, "Times New Roman", serif;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      min-width: 320px;
      max-width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden !important;
      background: var(--zq-bg);
      color: var(--zq-text);
      font-family: var(--font);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 12% 4%, rgba(185, 135, 50, 0.045), transparent 26%),
        radial-gradient(circle at 88% 0%, rgba(185, 135, 50, 0.04), transparent 24%),
        #ffffff;
    }

    body.popup-aberto {
      overflow: hidden !important;
      height: 100dvh !important;
    }

    img,
    video,
    iframe,
    canvas,
    svg {
      max-width: 100%;
    }

    img {
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    a,
    input,
    select,
    textarea {
      touch-action: manipulation;
    }

    button {
      cursor: pointer;
    }

    .site-wrapper-fixo {
      width: 100%;
      min-height: 100dvh;
      padding-bottom: 40px;
      overflow-x: hidden;
      background: #ffffff;
    }

    .zq-header,
    .zq-hero-area,
    .zq-category-bar,
    .categorias-container,
    main#produtos {
      width: min(var(--zq-max), calc(100% - var(--zq-pad) * 2));
      margin-left: auto;
      margin-right: auto;
    }

    /* =========================================================
       TOPO - PC
    ========================================================= */

    .zq-header {
      height: 96px;
      display: grid;
      grid-template-columns: 250px minmax(360px, 1fr) 390px;
      align-items: center;
      gap: 28px;
    }

    .zq-logo-text {
      display: inline-flex;
      align-items: flex-end;
      gap: 6px;
      width: max-content;
      position: relative;
      line-height: 1;
    }

    .zq-logo-crown {
      position: absolute;
      top: -17px;
      left: 88px;
      color: var(--zq-gold);
      font-size: 19px;
      line-height: 1;
    }

    .zq-logo-main {
      color: var(--zq-gold3);
      font-family: var(--font-title);
      font-size: 34px;
      letter-spacing: -0.055em;
      font-weight: 500;
    }

    .zq-logo-store {
      color: #111111;
      font-family: var(--font-title);
      font-size: 31px;
      letter-spacing: -0.055em;
      font-weight: 500;
    }

    .zq-search-box {
      width: 100%;
      max-width: 640px;
      height: 54px;
      justify-self: center;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border: 1px solid var(--zq-line);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .zq-search-box svg {
      width: 21px;
      height: 21px;
      color: #767676;
      stroke-width: 1.8;
    }

    .zq-search-box input {
      width: 100%;
      min-width: 0;
      height: 52px;
      border: 0;
      outline: none;
      background: transparent;
      color: #222;
      font-size: 15px;
      font-weight: 500;
    }

    .zq-search-box input::placeholder {
      color: #aaa39b;
    }

    .zq-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 54px;
      height: 100%;
    }

    .zq-nav a,
    .zq-nav button {
      position: relative;
      border: 0;
      background: transparent;
      color: #111;
      font-size: 15px;
      font-weight: 650;
      padding: 0;
    }

    .zq-nav a.active {
      color: var(--zq-gold3);
    }

    .zq-nav a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -20px;
      height: 1px;
      background: var(--zq-gold);
    }

    .zq-bag-btn {
      width: 34px;
      height: 38px;
      display: grid;
      place-items: center;
      color: var(--zq-gold3);
    }

    .zq-bag-btn svg {
      width: 27px;
      height: 27px;
      stroke-width: 1.7;
    }

    /* =========================================================
       HERO - PC
    ========================================================= */

    .zq-hero-area {
      margin-top: 0;
    }

    .zq-hero-card {
      position: relative;
      min-height: 348px;
      overflow: hidden;
      border-radius: 14px;
      background:
        linear-gradient(90deg, rgba(250, 247, 239, 0.98) 0%, rgba(250, 247, 239, 0.94) 36%, rgba(250, 247, 239, 0.35) 57%, rgba(250, 247, 239, 0.10) 100%),
        radial-gradient(circle at 74% 46%, rgba(185, 135, 50, 0.15), transparent 26%),
        linear-gradient(135deg, #f9f6ee, #eee5d8);
      border: 1px solid #eee7dc;
      box-shadow: var(--zq-shadow-soft);
    }

    .zq-hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 94% 4%, rgba(76, 112, 52, 0.12), transparent 13%),
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.78), transparent 18%),
        linear-gradient(100deg, rgba(255,255,255,0.38), transparent 42%);
      pointer-events: none;
    }

    .zq-hero-copy {
      position: relative;
      z-index: 3;
      width: 48%;
      padding: 88px 0 0 120px;
    }

    .zq-hero-copy h1 {
      margin: 0;
      max-width: 650px;
      color: #111;
      font-family: var(--font-title);
      font-size: clamp(39px, 3.9vw, 55px);
      line-height: 1.05;
      letter-spacing: -0.058em;
      font-weight: 600;
    }

    .zq-hero-copy p {
      margin: 22px 0 0;
      color: #55514c;
      font-size: 19px;
      line-height: 1.45;
      font-weight: 450;
    }

    .zq-hero-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 34px;
    }

    .zq-hero-line span:first-child {
      width: 76px;
      height: 3px;
      border-radius: 999px;
      background: var(--zq-gold);
    }

    .zq-hero-line span:last-child {
      width: 8px;
      height: 3px;
      border-radius: 999px;
      background: var(--zq-gold);
    }

    .zq-hero-visual {
      position: absolute;
      z-index: 2;
      right: 0;
      top: 0;
      bottom: 0;
      width: 56%;
      overflow: hidden;
    }

    .zq-product-scene {
      position: absolute;
      right: 32px;
      bottom: 0;
      width: 790px;
      height: 330px;
    }

    .zq-pedestal {
      position: absolute;
      left: 170px;
      bottom: 0;
      width: 330px;
      height: 78px;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(180deg, #f6f0e5, #e0d2bd);
      box-shadow: 0 -16px 40px rgba(99, 75, 44, 0.12);
    }

    .zq-headphone-band {
      position: absolute;
      left: 220px;
      top: 18px;
      width: 210px;
      height: 190px;
      border: 28px solid #e7dfd1;
      border-bottom: 0;
      border-radius: 120px 120px 0 0;
      box-shadow: inset 0 10px 18px rgba(255,255,255,0.55), 0 12px 25px rgba(70, 56, 37,0.12);
    }

    .zq-headphone-left,
    .zq-headphone-right {
      position: absolute;
      top: 134px;
      width: 74px;
      height: 108px;
      border-radius: 38px;
      background: linear-gradient(135deg, #f4eee3, #cfc0aa);
      box-shadow: 0 18px 26px rgba(68, 54, 37, 0.16);
    }

    .zq-headphone-left {
      left: 208px;
      transform: rotate(-7deg);
    }

    .zq-headphone-right {
      left: 380px;
      transform: rotate(8deg);
    }

    .zq-headphone-cup {
      position: absolute;
      inset: 12px;
      border-radius: 30px;
      background: linear-gradient(135deg, #c9b79e, #f9f4ec);
      border: 1px solid rgba(145, 118, 81, 0.18);
    }

    .zq-watch {
      position: absolute;
      left: 470px;
      top: 143px;
      width: 78px;
      height: 92px;
      border-radius: 24px;
      background: #ded4c4;
      transform: rotate(-4deg);
      box-shadow: 0 18px 26px rgba(68, 54, 37, 0.16);
    }

    .zq-watch::before {
      content: "";
      position: absolute;
      left: 15px;
      right: 15px;
      top: -48px;
      height: 52px;
      border-radius: 22px 22px 0 0;
      background: #d8cbbc;
    }

    .zq-watch::after {
      content: "";
      position: absolute;
      left: 15px;
      right: 15px;
      bottom: -48px;
      height: 52px;
      border-radius: 0 0 22px 22px;
      background: #d8cbbc;
    }

    .zq-watch-face {
      position: absolute;
      z-index: 2;
      inset: 8px;
      border-radius: 18px;
      background: #161616;
      border: 2px solid #b99559;
    }

    .zq-watch-face::before {
      content: "";
      position: absolute;
      left: 36px;
      top: 20px;
      width: 2px;
      height: 26px;
      background: #d9b267;
      transform: rotate(42deg);
      transform-origin: bottom;
    }

    .zq-watch-face::after {
      content: "";
      position: absolute;
      left: 36px;
      top: 24px;
      width: 2px;
      height: 20px;
      background: #fff2c9;
      transform: rotate(-52deg);
      transform-origin: bottom;
    }

    .zq-vase {
      position: absolute;
      right: 16px;
      bottom: 0;
      width: 150px;
      height: 210px;
      border-radius: 70px 70px 42px 42px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(125, 96, 56, 0.10) 0 4px,
          rgba(255,255,255,0.18) 4px 9px
        ),
        linear-gradient(135deg, #f1e4cf, #c8aa7d);
      box-shadow: 0 24px 35px rgba(70, 50, 25, 0.16);
    }

    .zq-vase::before {
      content: "";
      position: absolute;
      left: 38px;
      top: -22px;
      width: 74px;
      height: 42px;
      border-radius: 50%;
      background: #eadbc4;
    }

    .zq-leaf {
      position: absolute;
      z-index: 1;
      right: 106px;
      top: 10px;
      width: 48px;
      height: 22px;
      border-radius: 50% 0 50% 0;
      background: rgba(62, 94, 38, 0.48);
      transform: rotate(-24deg);
      filter: blur(0.2px);
    }

    .zq-leaf.two {
      right: 65px;
      top: 52px;
      transform: rotate(28deg);
      opacity: 0.75;
    }

    .zq-leaf.three {
      right: 168px;
      top: 76px;
      transform: rotate(54deg);
      opacity: 0.55;
    }

    /* =========================================================
       CATEGORIAS
    ========================================================= */

    .zq-category-bar {
      margin-top: 18px;
      min-height: 116px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      overflow: hidden;
      border: 1px solid var(--zq-line);
      border-radius: 13px;
      background: #ffffff;
      box-shadow: var(--zq-shadow-soft);
    }

    .zq-category-item-ref {
      min-width: 0;
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      gap: 18px;
      padding: 20px 28px;
      border: 0;
      border-right: 1px solid var(--zq-line);
      background: transparent;
      text-align: left;
      color: var(--zq-text);
      transition: 0.18s ease;
    }

    .zq-category-item-ref:last-child {
      border-right: 0;
    }

    .zq-category-item-ref:hover {
      background: #fffaf2;
    }

    .zq-category-icon-ref {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      color: var(--zq-gold);
    }

    .zq-category-icon-ref svg {
      width: 40px;
      height: 40px;
      stroke-width: 1.55;
    }

    .zq-category-item-ref strong {
      display: block;
      color: #222;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .zq-category-item-ref small {
      display: block;
      color: var(--zq-gold3);
      font-size: 13px;
      font-weight: 500;
    }

    /* =========================================================
       PRODUTOS
    ========================================================= */

    main#produtos {
      overflow: visible !important;
    }

    .categorias-container {
      margin-top: 28px;
      min-height: 360px;
      overflow: visible !important;
    }

    .categoria-loading {
      padding: 34px;
      border: 1px dashed var(--zq-line2);
      border-radius: 10px;
      background: #ffffff;
      text-align: center;
      color: var(--zq-muted);
    }

    .zq-products-section {
      padding: 0 !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
    }

    .zq-products-head {
      min-height: 42px;
      display: flex !important;
      align-items: flex-end !important;
      justify-content: space-between !important;
      gap: 20px !important;
      margin: 0 0 18px !important;
      padding: 0 16px !important;
    }

    .zq-products-head span {
      display: none !important;
    }

    .zq-products-head h2 {
      margin: 0 !important;
      color: #111 !important;
      font-family: var(--font-title) !important;
      font-size: 24px !important;
      line-height: 1 !important;
      letter-spacing: -0.04em !important;
      font-weight: 600 !important;
      position: relative !important;
    }

    .zq-products-head h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -14px;
      width: 54px;
      height: 2px;
      background: var(--zq-gold);
      border-radius: 999px;
    }

    .zq-products-head button {
      border: 0 !important;
      background: transparent !important;
      color: var(--zq-gold3) !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      padding: 0 !important;
    }

    .zq-products-head button::after {
      content: "›";
      display: inline-block;
      margin-left: 12px;
      font-size: 25px;
      line-height: 1;
      transform: translateY(3px);
    }

    .produtos-grid {
      width: 100% !important;
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)) !important;
      gap: 18px !important;
      align-items: stretch !important;
      justify-content: start !important;
      padding: 12px 16px 0 !important;
    }

    .produto-card,
    .zq-product-card,
    .produto {
      min-width: 0 !important;
      max-width: none !important;
    }

    .produto-card.zq-product-card {
      width: 100% !important;
      min-width: 0 !important;
      height: auto !important;
      display: grid !important;
      grid-template-rows: 208px 1fr !important;
      overflow: hidden !important;
      border-radius: 8px !important;
      border: 1px solid var(--zq-line) !important;
      background: #ffffff !important;
      box-shadow: 0 8px 22px rgba(37, 31, 22, 0.035) !important;
      cursor: pointer !important;
      transition: 0.18s ease !important;
    }

    .produto-card.zq-product-card:hover {
      transform: translateY(-2px) !important;
      border-color: var(--zq-line2) !important;
      box-shadow: 0 15px 32px rgba(37, 31, 22, 0.08) !important;
    }

    .produto-card-open {
      display: contents !important;
    }

    .produto-card .produto-img-wrap {
      width: 100% !important;
      height: 208px !important;
      min-height: 208px !important;
      max-height: 208px !important;
      position: relative !important;
      display: grid !important;
      place-items: center !important;
      overflow: hidden !important;
      background: #f7f7f6 !important;
    }

    .produto-card .produto-img-wrap img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      padding: 12px !important;
      display: block !important;
    }

    .produto-card .produto-fav {
      position: absolute !important;
      z-index: 5 !important;
      right: 10px !important;
      top: 10px !important;
      width: 28px !important;
      height: 28px !important;
      min-height: 28px !important;
      display: grid !important;
      place-items: center !important;
      padding: 0 !important;
      border: 0 !important;
      background: transparent !important;
      color: #8c8c8c !important;
      font-size: 25px !important;
      font-weight: 300 !important;
      line-height: 1 !important;
    }

    .produto-card .produto-info {
      width: 100% !important;
      min-width: 0 !important;
      display: grid !important;
      grid-template-rows: auto auto auto 1fr auto !important;
      gap: 8px !important;
      padding: 15px 14px 14px !important;
      background: #ffffff !important;
    }

    .produto-card .produto-categoria,
    .produto-card .produto-selo,
    .produto-card .preco-antigo,
    .produto-card .produto-parcelamento,
    .produto-card .produto-destaque-texto,
    .produto-card .produto-urgencia {
      display: none !important;
    }

    .produto-card .produto-info h3 {
      min-height: 42px !important;
      max-height: 42px !important;
      margin: 0 !important;
      color: #1d1d1d !important;
      font-size: 14px !important;
      line-height: 1.28 !important;
      font-weight: 500 !important;
      letter-spacing: 0 !important;
      overflow: hidden !important;
      display: -webkit-box !important;
      -webkit-line-clamp: 2 !important;
      -webkit-box-orient: vertical !important;
    }

    .produto-card .produto-rating {
      min-height: 18px !important;
      display: flex !important;
      align-items: center !important;
      gap: 5px !important;
      flex-wrap: nowrap !important;
      color: var(--zq-gold) !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      overflow: hidden !important;
    }

    .produto-card .estrelas-mini {
      display: inline-flex !important;
      align-items: center !important;
      gap: 1px !important;
      flex-shrink: 0 !important;
    }

    .produto-card .estrelas-mini img {
      width: 13px !important;
      height: 13px !important;
    }

    .produto-card .produto-rating small {
      color: #8b8b8b !important;
      font-size: 12px !important;
      font-weight: 400 !important;
      white-space: nowrap !important;
    }

    .produto-card .produto-precos {
      display: grid !important;
      gap: 2px !important;
      margin-top: 2px !important;
    }

    .produto-card .produto-precos strong {
      color: #111 !important;
      font-size: 18px !important;
      line-height: 1.1 !important;
      letter-spacing: -0.02em !important;
      font-weight: 700 !important;
    }

    .produto-card .produto-ver-btn {
      width: 100% !important;
      min-width: 0 !important;
      min-height: 44px !important;
      height: 44px !important;
      margin-top: 7px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      border-radius: 5px !important;
      border: 1px solid var(--zq-gold) !important;
      background: #ffffff !important;
      color: var(--zq-gold3) !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      line-height: 1 !important;
      padding: 0 12px !important;
      box-shadow: none !important;
    }

    .produto-card .produto-ver-btn:hover {
      background: #fff9ef !important;
    }

    .paginacao {
      margin-top: 22px !important;
      display: flex !important;
      justify-content: center !important;

  <script>
    function zyqenEscaparHTML(valor) {
      return String(valor || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

  <script id="zyqen-galeria-sem-corte-final">
  /*
    CORREÇÃO DEFINITIVA DA GALERIA MOBILE
    Esta parte fica por último para vencer:
    - CSS do index.html
    - CSS do style.css
    - CSS injetado pelo script.js

    O segredo aqui:
    A imagem não fica mais dentro de uma caixa com altura fixa.
    A própria imagem define a altura da área, então ela não corta.
  */
  (() => {
    const STYLE_ID = "zyqen-galeria-sem-corte-final-style";
    const OLD_STYLE_ID = "zyqen-mobile-produto-imagem-final";

    const css = `
      @media (max-width: 980px) {
        html body .popup-produto.ativo .popup-galeria {
          width: 100% !important;
          height: auto !important;
          min-height: 0 !important;
          max-height: none !important;
          display: block !important;
          padding: 10px 12px 8px !important;
          background: linear-gradient(180deg, #fff8ed 0%, #ffffff 100%) !important;
          border: 0 !important;
          overflow: visible !important;
        }

        html body .popup-produto.ativo .popup-imagem-area {
          width: 100% !important;
          height: auto !important;
          min-height: 0 !important;
          max-height: none !important;
          aspect-ratio: auto !important;
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
          overflow: hidden !important;
          border-radius: 18px !important;
          background: #ffffff !important;
        }

        html body .popup-produto.ativo #popup-imagem,
        html body .popup-produto.ativo .popup-imagem-area > img,
        html body .popup-produto.ativo .popup-video {
          width: 100% !important;
          height: auto !important;
          max-width: 100% !important;
          max-height: none !important;
          min-height: 0 !important;
          display: block !important;
          object-fit: contain !important;
          object-position: center center !important;
          padding: 0 !important;
          margin: 0 auto !important;
          border-radius: 0 !important;
          background: #ffffff !important;
        }

        html body .popup-produto.ativo .popup-thumbs {
          width: 100% !important;
          min-height: 60px !important;
          display: flex !important;
          align-items: center !important;
          gap: 9px !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          padding: 9px 2px 2px !important;
          margin: 0 !important;
          scrollbar-width: none !important;
        }

        html body .popup-produto.ativo .popup-thumbs::-webkit-scrollbar {
          display: none !important;
        }

        html body .popup-produto.ativo .thumb-midia {
          flex: 0 0 54px !important;
          width: 54px !important;
          height: 54px !important;
          min-width: 54px !important;
          min-height: 54px !important;
          display: grid !important;
          place-items: center !important;
          overflow: hidden !important;
          padding: 0 !important;
          border-radius: 13px !important;
          border: 1px solid #e8e2d7 !important;
          background: #ffffff !important;
        }

        html body .popup-produto.ativo .thumb-midia.ativo {
          border-color: #b98732 !important;
          box-shadow: 0 0 0 2px rgba(185,135,50,.18) !important;
        }

        html body .popup-produto.ativo .thumb-midia img {
          width: 100% !important;
          height: 100% !important;
          max-width: 100% !important;
          max-height: 100% !important;
          object-fit: cover !important;
          object-position: center center !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        html body .popup-produto.ativo .popup-seta {
          width: 42px !important;
          height: 42px !important;
          min-width: 42px !important;
          min-height: 42px !important;
          border-radius: 999px !important;
          background: rgba(255,255,255,.94) !important;
          border: 0 !important;
          color: #111 !important;
          box-shadow: 0 10px 28px rgba(20,18,15,.16) !important;
        }

        html body .popup-produto.ativo .popup-seta-esq {
          left: 12px !important;
        }

        html body .popup-produto.ativo .popup-seta-dir {
          right: 12px !important;
        }

        html body .popup-produto.ativo .popup-contador-imagem {
          right: 12px !important;
          bottom: 12px !important;
          z-index: 50 !important;
        }
      }
    `;

    function pegarImagemVisivel() {
      const video = document.getElementById("popup-video");
      if (video && video.style.display !== "none") return video;

      return document.getElementById("popup-imagem") || document.querySelector(".popup-imagem-area img");
    }

    function aplicarCss() {
      document.getElementById(OLD_STYLE_ID)?.remove();

      let style = document.getElementById(STYLE_ID);

      if (!style) {
        style = document.createElement("style");
        style.id = STYLE_ID;
        document.head.appendChild(style);
      }

      style.textContent = css;
    }

    function aplicarSemCorte() {
      const popup = document.getElementById("popup-produto");
      const area = document.querySelector(".popup-imagem-area");
      const midia = pegarImagemVisivel();
      const thumbs = document.getElementById("popup-thumbs");

      if (!popup || !popup.classList.contains("ativo") || !area || !midia) return;

      if (window.innerWidth > 980) return;

      aplicarCss();

      area.style.setProperty("height", "auto", "important");
      area.style.setProperty("min-height", "0", "important");
      area.style.setProperty("max-height", "none", "important");
      area.style.setProperty("aspect-ratio", "auto", "important");
      area.style.setProperty("overflow", "hidden", "important");
      area.style.setProperty("display", "flex", "important");
      area.style.setProperty("align-items", "center", "important");
      area.style.setProperty("justify-content", "center", "important");
      area.style.setProperty("background", "#ffffff", "important");

      midia.style.setProperty("width", "100%", "important");
      midia.style.setProperty("height", "auto", "important");
      midia.style.setProperty("max-width", "100%", "important");
      midia.style.setProperty("max-height", "none", "important");
      midia.style.setProperty("object-fit", "contain", "important");
      midia.style.setProperty("object-position", "center center", "important");
      midia.style.setProperty("padding", "0", "important");
      midia.style.setProperty("margin", "0 auto", "important");

      if (midia.tagName === "IMG") {
        midia.removeAttribute("width");
        midia.removeAttribute("height");
      }

      if (thumbs) {
        thumbs.style.setProperty("min-height", "60px", "important");

        thumbs.querySelectorAll(".thumb-midia").forEach(btn => {
          btn.style.setProperty("width", "54px", "important");
          btn.style.setProperty("height", "54px", "important");
          btn.style.setProperty("min-width", "54px", "important");
          btn.style.setProperty("min-height", "54px", "important");
          btn.style.setProperty("flex", "0 0 54px", "important");
        });
      }
    }

    function aplicarVariasVezes() {
      aplicarSemCorte();
      setTimeout(aplicarSemCorte, 60);
      setTimeout(aplicarSemCorte, 180);
      setTimeout(aplicarSemCorte, 420);
      setTimeout(aplicarSemCorte, 850);
    }

    function observar() {
      const observer = new MutationObserver(aplicarVariasVezes);

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ["class", "style", "src"]
      });
    }

    aplicarCss();

    window.addEventListener("load", aplicarVariasVezes);
    window.addEventListener("resize", aplicarVariasVezes);
    window.addEventListener("orientationchange", aplicarVariasVezes);
    document.addEventListener("click", aplicarVariasVezes);
    document.addEventListener("touchend", aplicarVariasVezes);

    if (document.body) observar();
    else document.addEventListener("DOMContentLoaded", observar);

    setInterval(() => {
      if (document.querySelector(".popup-produto.ativo")) {
        aplicarSemCorte();
      }
    }, 180);
  })();
  </script>
